    <!-- JSON-LD: FAQPage (Google AI Overview eligibility) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Zertainity?",

            "@type": "Answer",
            "text": "Zertainity is India's leading AI-powered career guidance platform that helps students discover their perfect career path through interest assessments, academic performance evaluation, and personalized recommendations. It is completely free to use."
          }
        },
        {
          "@type": "Question",
          "name": "How does Zertainity help students choose a career?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zertainity uses advanced AI algorithms to analyze your academic interests, subject scores, and personal preferences. It then generates a personalized career recommendation list with detailed roadmaps showing you the exact steps from school to your dream career."
          }
        },
        {
          "@type": "Question",
          "name": "Is Zertainity free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Zertainity is completely free for all students. You can take the AI career aptitude test, explore career paths, and get personalized college recommendations without any cost."
          }
        },
        {
          "@type": "Question",
          "name": "Which students can use Zertainity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zertainity is designed for Indian students at all levels — Class 10, Class 12, and undergraduate students who are deciding their career stream or looking for career clarity after graduation."
          }
        },
        {
          "@type": "Question",
          "name": "What careers does Zertainity cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zertainity covers 100+ career paths including Technology (Software Engineering, AI/ML), Medicine (MBBS, BAMS), Engineering, Law, Government Services (IAS, IPS, SSC), Finance (CA, Investment Banking), Design, Media, Agriculture, Aviation, Sports, and many more careers available in India."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is Zertainity's AI career guidance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zertainity's AI analyzes multiple data points including your subject performance, interests, and career market demand in India to provide highly personalized recommendations. The platform is continuously improved based on student feedback and career market trends."
          }
        },
        {
          "@type": "Question",
          "name": "What should a student do after 10th for their career?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After 10th, students in India must choose between Science (PCM or PCB), Commerce, and Arts/Humanities streams. Zertainity's AI helps students pick the right stream based on their interests and career goals, ensuring better alignment for future opportunities."
          }
        },
        {
          "@type": "Question",
          "name": "How to choose a career after 12th in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After 12th, students can use Zertainity's free career quiz to get personalized recommendations. The platform analyzes your 12th grade subjects, marks, and interests to suggest the best degree courses, colleges, and career paths suited for you in India."
          }
        },
        {
          "@type": "Question",
          "name": "Does Zertainity recommend colleges in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Zertainity provides personalized college recommendations based on your career goals, academic performance, and preferred location within India. It suggests the most relevant institutions for your chosen career path."
          }
        },
        {
          "@type": "Question",
          "name": "Who created Zertainity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zertainity was created by Johan Manoj and Viney Ragesh with the mission to provide every Indian student with access to quality, AI-powered career guidance, democratizing what was previously available only through expensive career counsellors."
          }
        }
      ]
    }
